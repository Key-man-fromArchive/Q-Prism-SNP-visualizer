services:
  snp-analyzer:
    build: .
    container_name: snp-analyzer
    restart: unless-stopped
    ports:
      - "8002:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app:/app/app
      - snp-data:/app/data
      - ./pcrd-pw.txt:/app/secrets/pcrd-pw.txt:ro
    env_file:
      - .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - DB_PATH=/app/data/snp_analyzer.db
      - SNP_AUTH_MODE=${SNP_AUTH_MODE:-local}
      - ASG_BASE_URL=${ASG_BASE_URL:-http://asg-saas-v2-web:8000}
      - ASG_SNP_SERVICE_SECRET=${ASG_SNP_SERVICE_SECRET:-}
      - ASG_SESSION_EXPIRY_MINUTES=${ASG_SESSION_EXPIRY_MINUTES:-60}
      - SNP_COOKIE_PATH=${SNP_COOKIE_PATH:-/}

volumes:
  snp-data:
