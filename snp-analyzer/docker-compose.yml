services:
  snp-analyzer:
    build: .
    container_name: snp-analyzer
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - ./app:/app/app
      - snp-data:/app/data
      - ./pcrd-pw.txt:/app/secrets/pcrd-pw.txt:ro
    env_file:
      - .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - DB_PATH=/app/data/snp_analyzer.db
      - SNP_AUTH_MODE=${SNP_AUTH_MODE:-local}

volumes:
  snp-data:
