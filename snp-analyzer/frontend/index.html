<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Parse and analyze raw ASG-PCR (allele-specific genotyping PCR) data to extract and summarize SNP genotyping results from instrument output.">
    <meta name="keywords" content="ASG-PCR, SNP discrimination, allele-specific genotyping PCR, SNP analysis, genotyping data parser, SNP calling, raw data analyzer, Invirustech">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://snpanalyze.ivttools.com/">
    <meta property="og:type" content="website">
    <meta property="og:title" content="ASG-PCR SNP Discrimination Analyzer | IVTTools">
    <meta property="og:description" content="Parse and summarize SNP genotyping results from raw ASG-PCR instrument data.">
    <meta property="og:url" content="https://snpanalyze.ivttools.com/">
    <title>ASG-PCR SNP Discrimination Analyzer</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var storageKey = "__asg_launch_token";
        var url = new URL(window.location.href);
        var token = url.searchParams.get("token");

        if (!token && url.hash) {
          var hashParams = new URLSearchParams(url.hash.slice(1));
          token = hashParams.get("token");
          hashParams.delete("token");
          var nextHash = hashParams.toString();
          url.hash = nextHash ? "#" + nextHash : "";
        }

        if (!token) return;

        url.searchParams.delete("token");
        try {
          window.sessionStorage.setItem(storageKey, token);
        } catch (err) {
          window.__ASG_LAUNCH_TOKEN__ = token;
        }
        window.history.replaceState({}, document.title, url.pathname + url.search + url.hash);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
